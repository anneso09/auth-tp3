# ===================================
# CONNEXION À LA BASE DE DONNÉES
# ===================================

# L'URL de ta base de données MySQL dans WAMP
# "localhost" = ton propre ordi
# "3306" = le port par défaut de MySQL
# "auth_tp3" = le nom de la base qu'on a créée dans phpMyAdmin
spring.datasource.url=jdbc:mysql://localhost:3306/auth_tp3?useSSL=false&serverTimezone=UTC

# Ton nom d'utilisateur MySQL (par défaut dans WAMP c'est "root")
spring.datasource.username=root

# Ton mot de passe MySQL (par défaut dans WAMP c'est vide)
spring.datasource.password=

# Le driver Java qui permet de parler à MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================
# CONFIGURATION JPA / HIBERNATE
# ===================================

# "validate" = Spring vérifie que les tables existent mais ne les modifie pas
# On a déjà créé les tables manuellement dans phpMyAdmin
spring.jpa.hibernate.ddl-auto=validate

# Affiche les requêtes SQL dans la console (utile pour débugger)
spring.jpa.show-sql=true

# Indique qu'on utilise MySQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ===================================
# CONFIGURATION SERVEUR
# ===================================

# Le port sur lequel ton API va tourner
server.port=8080